name: 4AM Morning Snapshot

on:
  schedule:
    # Runs at 09:17 UTC (4:17 AM Central Time)
    - cron: '17 9 * * *'
  workflow_dispatch: # Manual "Run Now" button in GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run Scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add opening_lines.csv
          git commit -m "Automated Morning Snapshot [skip ci]" || exit 0
          git push
