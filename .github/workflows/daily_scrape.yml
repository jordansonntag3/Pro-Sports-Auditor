name: Daily Opening Lines Scraper

on:
  schedule:
    # Runs at 9:00 AM UTC (4:00 AM Central Time)
    - cron: '0 9 * * *'
  workflow_dispatch: # This adds the "Manual Run" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Run Scraper Robot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper.py

      - name: Save Cleaned CSV to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add opening_lines.csv
          git commit -m "Automated update: 4:00 AM Lines + Purge" || exit 0
          git push
