name: Daily Opening Lines Scraper

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: 

# THIS BLOCK IS THE FIX: It forces write access for the robot
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true # Keeps the login active for the push

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Run Scraper Robot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper.py

      - name: Save Cleaned CSV to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add opening_lines.csv
          # The '|| exit 0' prevents it from failing if there are no new games to save
          git commit -m "Automated update: 4:00 AM Lines" || exit 0
          git push origin main
