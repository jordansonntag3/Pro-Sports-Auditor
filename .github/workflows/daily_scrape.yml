name: Daily Opening Lines Scraper

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Use your new VIP badge here
          token: ${{ secrets.SCRAPER_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Run Scraper Robot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scraper.py

      - name: Push CSV Changes
        # This is a pre-built tool that handles the "128" error for us
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update: 4:00 AM Lines"
          file_pattern: 'opening_lines.csv'
          branch: main
